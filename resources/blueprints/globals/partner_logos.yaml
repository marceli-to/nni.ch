tabs:
  main:
    display: Main
    sections:
      -
        display: 'Partner Logos'
        instructions: 'Logos shown in the auto-scrolling marquee. Managed once here and inserted on any page via the "Logo Marquee" element. For a consistent look, use identically sized rectangles (transparent or white background) for every logo.'
        fields:
          -
            handle: marquee_logos
            field:
              collapse: true
              previews: true
              type: replicator
              display: Logos
              icon: replicator
              localizable: false
              listable: hidden
              instructions_position: above
              visibility: visible
              replicator_preview: true
              hide_display: false
              sets:
                logos:
                  display: Logos
                  sets:
                    logo:
                      display: Logo
                      instructions: null
                      icon: media-image-picture-orientation
                      fields:
                        -
                          handle: image
                          field:
                            max_files: 1
                            min_files: 1
                            mode: list
                            container: assets
                            restrict: false
                            allow_uploads: true
                            show_filename: true
                            show_set_alt: true
                            type: assets
                            display: Logo
                            icon: assets
                            localizable: false
                            listable: hidden
                            instructions_position: above
                            visibility: visible
                            replicator_preview: true
                            hide_display: false
                            validate:
                              - required
                        -
                          handle: title
                          field:
                            input_type: text
                            antlers: false
                            type: text
                            display: Title
                            icon: text
                            instructions: 'Company / brand name. Used as the image alt text.'
                            localizable: false
                            listable: hidden
                            instructions_position: above
                            visibility: visible
                            replicator_preview: true
                            hide_display: false
                            validate:
                              - required
                        -
                          handle: url
                          field:
                            input_type: url
                            antlers: false
                            type: text
                            display: 'Link (optional)'
                            icon: link
                            instructions: 'Optional external link, e.g. https://example.com. Opens in a new tab.'
                            localizable: false
                            listable: hidden
                            instructions_position: above
                            visibility: visible
                            replicator_preview: true
                            hide_display: false
