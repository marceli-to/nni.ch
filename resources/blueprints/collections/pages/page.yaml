title: Page
tabs:
  main:
    display: Content
    sections:
      -
        display: Content
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
              display: Titel
              localizable: true
          -
            handle: page_elements
            field:
              collapse: true
              type: replicator
              display: Inhalte
              localizable: true
              sets:
                main_elements:
                  display: 'Main Elements'
                  icon: addon-boxes-stack
                  sets:
                    intro:
                      display: 'Intro Fullscreen'
                      instructions: 'Add an intro (Video/Image)'
                      icon: media-image-picture-orientation
                      fields:
                        -
                          import: intro
                    teaser_video:
                      display: 'Fullscreen Video'
                      instructions: 'Add a teaser with a video, text and call to action.'
                      icon: media-webcam-video
                      fields:
                        -
                          import: teaser_video
                    teaser_fullscreen_image:
                      display: 'Fullscreen Image'
                      instructions: 'Add a teaser with a fullscreen image, text and call to action.'
                      icon: media-image-picture-orientation
                      fields:
                        -
                          import: teaser_image
                    teaser_image_text:
                      display: 'Image - Text'
                      instructions: 'Add a teaser with an image, a text and a call to action.'
                      icon: text-formatting-wrap-image-margin-left
                      fields:
                        -
                          import: teaser_image_text
                    title_text:
                      display: 'Title - Text'
                      instructions: 'Add title/text element'
                      icon: text-formatting-image-right
                      fields:
                        -
                          import: title_text
                    editor:
                      display: Texteditor
                      icon: text-formatting-markdown
                      fields:
                        -
                          import: editor
                special_elements:
                  display: 'Special Elements'
                  icon: addon-boxes-stack
                  sets:
                    statement:
                      display: Statement
                      instructions: 'Optional Heading with an offset text'
                      icon: text-formatting-initial-letter
                      fields:
                        -
                          import: statement
                    cta_expertise:
                      display: 'CTA Consultation'
                      instructions: 'Consultation CTA (text left, portrait right).'
                      icon: alert-alarm-bell
                      fields:
                        -
                          import: cta_expertise
                    teaser_project:
                      display: 'Portfolio (Masonry)'
                      instructions: 'Add a set of images, a text and a link.'
                      icon: text-formatting-image-left
                      fields:
                        -
                          import: teaser_project
                    teaser_competencies:
                      display: 'Teaser Competencies'
                      instructions: '3-column competencies teaser, with or without images.'
                      icon: layout-three-columns
                      fields:
                        -
                          import: teaser_competencies
                    principles:
                      display: Principles
                      instructions: 'Add company principles'
                      icon: text-formatting-image-left
                      fields:
                        -
                          import: principles
                    facts_figures:
                      display: 'Facts & Figures'
                      instructions: 'Key numbers with labels (e.g. 8000+ Visualised projects).'
                      icon: analytics-graph-bar
                      fields:
                        -
                          import: facts_figures
                    teaser_blog:
                      display: 'Blog Teaser'
                      instructions: 'Add the latest 3 blog entries'
                      icon: layout-three-columns
                      fields:
                        -
                          import: teaser_blog
                    slideshow_team:
                      display: 'Slideshow Team'
                      instructions: 'Add the team as a slideshow'
                      icon: layout-three-columns
                      fields:
                        -
                          import: slideshow_team
                    jobs:
                      display: Jobs
                      instructions: 'Add a list of published jobs'
                      icon: text-formatting-image-left
                      fields:
                        -
                          import: jobs
                    faq:
                      display: FAQ
                      instructions: 'Add an FAQ section'
                      icon: form-drop-down-menu
                      fields:
                        -
                          import: faq
                    workflow:
                      display: Workflow
                      instructions: 'Add a workflow with multiple phases'
                      icon: layout-split-horizontal
                      fields:
                        -
                          import: workflow
                    services:
                      display: Services
                      instructions: 'Add a list of services'
                      icon: layout-split-horizontal
                      fields:
                        -
                          import: services
                    marquee:
                      display: 'Logo Marquee'
                      instructions: 'Insert the auto-scrolling, full-width logo strip, then add the logos directly on this element.'
                      icon: layout-three-columns
                      fields:
                        -
                          import: marquee
                    network:
                      display: Network
                      instructions: 'A titled row of network partners — logo, label and external link each.'
                      icon: layout-three-columns
                      fields:
                        -
                          import: network
                graphical_elements:
                  display: 'Graphical Elements'
                  icon: addon-boxes-stack
                  sets:
                    horizontal_ruler:
                      display: 'Horizontal Ruler'
                      instructions: 'Add a thin, gray line'
                      icon: align-object-bottom
                      fields:
                        -
                          import: horizontal_ruler
  seo:
    display: SEO
    sections:
      -
        display: SEO
        fields:
          -
            import: seo
  settings:
    display: Settings
    sections:
      -
        display: Settings
        fields:
          -
            import: settings
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
              show_regenerate: true
          -
            handle: parent
            field:
              type: entries
              collections:
                - pages
              max_items: 1
              listable: false
              localizable: true
