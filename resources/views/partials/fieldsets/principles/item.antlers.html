<div class="flex flex-col justify-center pb-45 lg:pb-90 {{ class }}">
  <article class="grid grid-cols-6 lg:grid-cols-12 gap-x-20 lg:gap-x-30 xl:gap-x-50">
    <div class="col-span-full lg:col-span-6 xl:col-span-5 mb-20">
      {{ partial:ui/heading/h2 size="none" class="uppercase font-meta-medium text-xl md:text-5xl lg:text-8xl tracking-widest" }}
        {{ title }}
      {{ /partial:ui/heading/h2 }}
    </div>
    <div class="col-span-full lg:col-span-6 xl:col-span-7 lg:mt-50">
      {{ text }}
    </div>
  </article>
</div>
