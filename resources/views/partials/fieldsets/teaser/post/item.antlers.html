<a href="{{ url }}" class="group">
  <span class="block mb-10 text-xxs xl:text-sm">
    {{ date iso_format="D. MMMM YYYY" }}
  </span>
  {{ partial:content/post/media/preview ratio="aspect-square" }}
  {{ partial:ui/heading/h3 size="2xs" class="mt-15 !leading-[1.25]" }}
    {{ title }}
  {{ /partial:ui/heading/h3 }}
</a>
