{{#
  Shared CTA section shell. Pass fullpage="true" to make the section respect the
  page-level is_fullpage toggle (min-h-screen) and be observed, so its
  [data-animation] children reveal on scroll — like the other main elements.
#}}
{{ if fullpage }}
  <section
    data-section
    data-section-theme="light"
    data-section-observe
    class="relative {{ is_fullpage ? 'min-h-screen flex flex-col justify-center' : '' }} py-30 md:py-60 xl:py-90">
    {{ slot }}
  </section>
{{ else }}
  <section data-section data-section-theme="light" class="py-30 md:py-60 xl:py-90">
    {{ slot }}
  </section>
{{ /if }}
