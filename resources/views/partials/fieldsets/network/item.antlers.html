{{ if image && url }}
  <a
    href="{{ url }}"
    target="_blank"
    rel="noopener noreferrer"
    title="{{ label }}"
    class="group flex flex-col no-underline">

    <div class="flex items-center justify-center aspect-square mb-30 lg:mb-50">
      <img
        src="{{ image:url }}"
        alt="{{ label }}"
        class="block max-h-full max-w-full w-auto object-contain group-hover:opacity-60 transition-opacity"
        loading="lazy">
    </div>

    <span class="mt-auto flex items-center gap-x-10 xl:gap-x-15 pb-15 border-b border-b-black text-xs md:text-md leading-[1.25] font-meta-medium uppercase tracking-wider">
      <span class="group-hover:translate-x-6 transition-transform">{{ label }}</span>
      {{ partial:ui/icon/arrow-right-long class="w-18 xl:w-22 h-auto group-hover:translate-x-10 transition-transform" }}
    </span>
  </a>
{{ /if }}
