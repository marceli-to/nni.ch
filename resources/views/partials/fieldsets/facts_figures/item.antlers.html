<div class="space-y-20 md:odd:text-right {{ class }}">
  <div class="relative inline-block w-auto">
    <span class="font-meta-medium text-9xl lg:text-10xl xl:text-11xl leading-none">
      {{ number }}
    </span>
    <span class="block absolute -bottom-5 xl:bottom-5 left-full -translate-x-[60%] md:-translate-x-[85%] whitespace-nowrap font-meta-medium text-sm md:text-base lg:text-lg xl:text-xl leading-none bg-white px-10 py-5">
      {{ label }}
    </span>
  </div>
</div>
