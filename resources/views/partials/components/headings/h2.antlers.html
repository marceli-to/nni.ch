{{ if is_project }}
  <h2 class="font-meta-medium {{ class }}">
    {{ slot }}
  </h2>
{{ elseif is_teaser }}
  <h2 class="text-3xl xl:text-5xl leading-[1.2] {{ class }}" {{ data }}>
    {{ slot }}
  </h2>
{{ else }}
  <h2 class="text-3xl md:text-5xl xl:text-7xl leading-[1.2] {{ class }}" {{ data }}>
    {{ slot }}
  </h2>
{{ /if }}
