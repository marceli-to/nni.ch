{{ if email }}
  <a
    href="mailto:{{ email }}"
    title="{{ "E-Mail" | trans }} {{ title }}"
    class="block no-underline hover:underline hover:underline-offset-8 hover:decoration-1">
    {{ email }}
  </a>
{{ /if }}
{{ if phone }}
  <a
    href="tel:{{ phone }}"
    title="{{ "Telefon Nr." | trans }} {{ title }}"
    class="block no-underline hover:underline hover:underline-offset-8 hover:decoration-1">
    {{ phone }}
  </a>
{{ /if }}
