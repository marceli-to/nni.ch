{{# size = text-size step only (weight/treatment go in `class`). See docs/cleanup/04-headings.md #}}
{{ if size == 'xs' }}
  <h2 class="text-md md:text-xl xl:text-4xl {{ class }}" {{ data }}>
    {{ slot }}
  </h2>
{{ elseif size == 'sm' }}
  <h2 class="text-2xl md:text-3xl xl:text-5xl leading-[1.15] {{ class }}" {{ data }}>
    {{ slot }}
  </h2>
{{ elseif size == 'md' }}
  <h2 class="text-3xl xl:text-6xl leading-[1.2] {{ class }}" {{ data }}>
    {{ slot }}
  </h2>
{{ elseif size == 'none' }}
  <h2 class="{{ class }}" {{ data }}>
    {{ slot }}
  </h2>
{{ else }}
  <h2 class="text-3xl md:text-5xl xl:text-7xl leading-[1.2] {{ class }}" {{ data }}>
    {{ slot }}
  </h2>
{{ /if }}
