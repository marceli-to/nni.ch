title: 'CTA Expertise'
fields:
  -
    handle: person
    field:
      mode: select
      max_items: 1
      create: false
      collections:
        - team
      type: entries
      display: Person
      instructions: 'Select the team member. Portrait, role, email and phone are pulled from this entry.'
      localizable: false
      validate:
        - required
  -
    handle: image
    field:
      max_files: 1
      min_files: 1
      container: assets
      type: assets
      display: Image
      instructions: 'Upload the portrait shown next to the text.'
      localizable: false
  -
    handle: heading
    field:
      buttons:
        - bold
        - removeformat
      inline: break
      fullscreen: false
      allow_source: false
      remove_empty_nodes: true
      type: bard
      display: Heading
      instructions: 'Bold the name for emphasis, e.g. “Wie wärs mit einer Sprechstunde mit **Christoph Deiters?**”'
      localizable: true
  -
    import: cta
