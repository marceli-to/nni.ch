title: 'Logo Marquee'
fields:
  -
    handle: marquee_logos
    field:
      collapse: true
      previews: true
      type: replicator
      display: Logos
      icon: replicator
      instructions: 'Add logos. For a consistent look, use identically sized rectangles (transparent or white background) for every logo.'
      localizable: false
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
      sets:
        logos:
          display: Logos
          sets:
            logo:
              display: Logo
              instructions: null
              icon: media-image-picture-orientation
              fields:
                -
                  handle: image
                  field:
                    max_files: 1
                    min_files: 1
                    mode: list
                    container: assets
                    restrict: false
                    allow_uploads: true
                    show_filename: true
                    show_set_alt: true
                    type: assets
                    display: Logo
                    icon: assets
                    localizable: false
                    listable: hidden
                    instructions_position: above
                    visibility: visible
                    replicator_preview: true
                    hide_display: false
                    validate:
                      - required
                -
                  handle: title
                  field:
                    input_type: text
                    antlers: false
                    type: text
                    display: Title
                    icon: text
                    instructions: 'Company / brand name. Used as the image alt text.'
                    localizable: true
                    listable: hidden
                    instructions_position: above
                    visibility: visible
                    replicator_preview: true
                    hide_display: false
                    validate:
                      - required
                -
                  handle: url
                  field:
                    input_type: url
                    antlers: false
                    type: text
                    display: 'Link (optional)'
                    icon: link
                    instructions: 'Optional external link, e.g. https://example.com. Opens in a new tab.'
                    localizable: true
                    listable: hidden
                    instructions_position: above
                    visibility: visible
                    replicator_preview: true
                    hide_display: false
