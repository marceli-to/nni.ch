title: 'Project Teaser'
fields:
  -
    handle: mirrored
    field:
      type: toggle
      display: 'Mirrored?'
      localizable: false
  -
    import: title
    prefix: teaser_project_
  -
    handle: main_link
    field:
      type: link
      display: 'Main link'
      instructions: 'Main link below the title. If empty, a link to the portfolio will be generated.'
      localizable: true
      collections:
        - pages
        - projects
        - posts
  -
    handle: main_link_title
    field:
      type: text
      display: 'Main link label'
      instructions: 'Optional label for the main link. If empty, "Projekt anfragen" (translated) is used.'
      localizable: true
  -
    handle: items
    field:
      type: group
      display: 'Grid items'
      localizable: false
      fields:
        -
          handle: item_top_left
          field:
            type: section
            display: 'Item (top, left)'
            icon: section
            localizable: false
            listable: hidden
            instructions_position: above
            visibility: visible
            replicator_preview: true
            hide_display: false
        -
          import: teaser_project_item
          prefix: tl_
        -
          handle: item_top_right
          field:
            type: section
            display: 'Item (top, right)'
            icon: section
            localizable: false
            listable: hidden
            instructions_position: above
            visibility: visible
            replicator_preview: true
            hide_display: false
        -
          import: teaser_project_item
          prefix: tr_
        -
          handle: item_bottom_left
          field:
            type: section
            display: 'Item (bottom, left)'
            icon: section
            localizable: false
            listable: hidden
            instructions_position: above
            visibility: visible
            replicator_preview: true
            hide_display: false
        -
          import: teaser_project_item
          prefix: bl_
        -
          handle: item_bottom_right
          field:
            type: section
            display: 'Item (bottom, right)'
            icon: section
            localizable: false
            listable: hidden
            instructions_position: above
            visibility: visible
            replicator_preview: true
            hide_display: false
        -
          import: teaser_project_item
          prefix: br_
  -
    import: cta_section_header
  -
    import: cta_text
  -
    import: cta
  -
    handle: text
    field:
      buttons:
        - bold
        - unorderedlist
        - removeformat
        - anchor
      remove_empty_nodes: true
      type: bard
      toolbar_mode: floating
      display: Text
      localizable: false
