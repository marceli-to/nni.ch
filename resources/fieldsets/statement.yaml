title: Statement
fields:
  -
    handle: heading
    field:
      buttons:
        - bold
        - removeformat
      inline: break
      remove_empty_nodes: true
      type: bard
      toolbar_mode: floating
      display: Heading
      instructions: 'Bold the second word for emphasis, e.g. “Imagine **tomorrow**”.'
      localizable: true
  -
    handle: text
    field:
      buttons:
        - h1
        - h2
        - h3
        - bold
        - italic
        - unorderedlist
        - removeformat
        - anchor
      smart_typography: false
      save_html: false
      inline: false
      toolbar_mode: floating
      reading_time: false
      word_count: false
      fullscreen: true
      allow_source: true
      enable_input_rules: true
      enable_paste_rules: true
      remove_empty_nodes: false
      antlers: false
      link_noopener: false
      link_noreferrer: false
      target_blank: false
      always_show_set_button: false
      collapse: false
      previews: true
      type: bard
      display: Text
      icon: bard
      listable: hidden
      instructions_position: above
      visibility: visible
      replicator_preview: true
      hide_display: false
      container: assets
      localizable: true
